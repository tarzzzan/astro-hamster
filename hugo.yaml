# Hugo configuration file
baseURL: "https://tarzzzan.ru/"
title: Весёлый хомяк =]

# import hextra as module
theme: hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: https://github.com/imfing
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  editURL:
    enable: false
    base: http://192.168.1.19:8080/proxy/1313/

