# Hugo configuration file
baseURL: "https://tarzzzan.ru/"
title: Весёлый хомяк =]
languageCode: ru-RU

# import hextra as module
theme: hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: true

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Поиск
      weight: 3
      params:
        type: search

params:
  favicon: /img/favicon/favicon.ico
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  editURL:
    enable: false
