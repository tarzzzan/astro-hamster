# PagesCMS Configuration for Astro Hamster (@cxro/astro-whono)
# Synced with src/content.config.ts schema

cms:
  enabled: true
  repo: tarzzzan/astro-hamster
  branch: main
  publish:
    message: 'Update content via PagesCMS'
    immediate: true

media:
  input: src/assets
  output: src/assets

content:
  - name: essay
    label: Эссе (Essay)
    type: collection
    path: src/content/essay
    format: frontmatter
    singular: Эссе
    fields:
      - name: title
        label: Заголовок
        type: string
        required: true
      - name: description
        label: Описание
        type: string
        required: false
      - name: date
        label: Дата публикации (ГГГГ-ММ-ДД)
        type: date
        required: true
      - name: tags
        label: Теги
        type: array
        required: false
        items: string
      - name: draft
        label: Черновик
        type: boolean
        default: false
      - name: archive
        label: Архивировать
        type: boolean
        default: true
      - name: cover
        label: Обложка
        type: string
        required: false
      - name: badge
        label: Значок
        type: string
        required: false
      - name: slug
        label: URL (опционально)
        type: string
        required: false
      - name: body
        label: Содержание
        type: rich-text
        required: true

  - name: bits
    label: Короткие записи (Bits)
    type: collection
    path: src/content/bits
    format: frontmatter
    singular: Запись
    fields:
      - name: title
        label: Заголовок (опционально)
        type: string
        required: false
      - name: description
        label: Описание (опционально)
        type: string
        required: false
      - name: date
        label: Дата публикации (ГГГГ-ММ-ДД)
        type: date
        required: true
      - name: tags
        label: Теги
        type: array
        required: false
        items: string
      - name: draft
        label: Черновик
        type: boolean
        default: false
      - name: slug
        label: URL (опционально)
        type: string
        required: false
      - name: body
        label: Содержание
        type: rich-text
        required: true

  - name: memo
    label: Заметки (Memo)
    type: collection
    path: src/content/memo
    format: frontmatter
    singular: Заметка
    fields:
      - name: title
        label: Заголовок
        type: string
        required: true
      - name: subtitle
        label: Подзаголовок (опционально)
        type: string
        required: false
      - name: date
        label: Дата (опционально)
        type: date
        required: false
      - name: draft
        label: Черновик
        type: boolean
        default: false
      - name: slug
        label: URL (опционально)
        type: string
        required: false
      - name: body
        label: Содержание
        type: rich-text
        required: true